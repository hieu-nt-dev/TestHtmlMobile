<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài Xế Ký Tài — Packing Prototype</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; }
body {
  background: #0a0a14;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'Courier New', monospace;
  color: #eee;
}

/* ── GAME CONTAINER: 48 × 27 grid (16:9 aspect) ─────────── */
#game {
  /* Outer keeps aspect ratio 48:27 = 16:9 */
  --cols: 48;
  --rows: 27;
  width: min(98vw, calc(98vh * 48/27));
  height: min(98vh, calc(98vw * 27/48));
  background: #1a1a2e;
  position: relative;
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  grid-template-rows: repeat(var(--rows), 1fr);
  gap: 2px;
  padding: 8px;
  overflow: hidden;
}

/* Cell helper: each region uses grid-column / grid-row to place */
.region {
  position: relative;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(8px, 0.9vw, 14px);
  user-select: none;
  overflow: hidden;
}

/* Region styles by kind */
.r-items     { background: rgba(13,27,46,.5); border: 1px dashed #2a5a9e; }
.r-pack      { background: rgba(13,27,46,.4); border: 1px dashed #3a4a6e; padding: 4px; }
.r-sticker   { background: #1a3056; border: 2px solid #2a5a9e; cursor: grab; transition: transform .1s, border-color .1s; }
.r-sticker:hover { border-color: #f5c542; transform: scale(1.04); }
.r-sticker.dragging { opacity: .5; }
.r-sticker.disabled { opacity: .4; cursor: not-allowed; }

.r-foam, .r-bubble, .r-address {
  background: #1a3a56; border: 2px solid #2a5a9e; cursor: grab;
  transition: transform .1s, border-color .1s;
}
.r-foam:hover, .r-bubble:hover, .r-address:hover { border-color: #f5c542; transform: scale(1.04); }
.r-foam.dragging, .r-bubble.dragging, .r-address.dragging { opacity: .5; }

.r-tape {
  background: #5a3a10; border: 2px solid #c87030; cursor: grab;
  transition: transform .1s, border-color .1s;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(14px, 1.6vw, 22px);
}
.r-tape:hover { border-color: #f5c542; transform: scale(1.04); }
.r-tape.dragging { opacity: .5; }

.r-printer   {
  background: linear-gradient(180deg, #0f3a5a, #16213e);
  border: 3px solid #f5c542;
  cursor: pointer;
  transition: transform .1s;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  font-size: clamp(10px, 1vw, 14px);
}
.r-printer:hover { transform: scale(1.03); border-color: #fff; }
.r-printer:active { transform: scale(.97); }

.r-shredder  {
  background: #2a1a1a; border: 2px solid #5a3030;
  cursor: not-allowed; opacity: .55;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.r-scanner   {
  background: linear-gradient(135deg, #1a3a5e, #0a1a3a);
  border: 2px solid #2a5a9e; opacity: .65;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.r-trash     {
  background: #2a1a2a; border: 2px dashed #6a3a6a;
  cursor: pointer; opacity: .6;
  display: flex; align-items: center; justify-content: center;
}
.r-trash.drag-over { opacity: 1; border-color: #e74c3c; background: #4a1a2a; }

.r-box-pick  {
  background: #2a1a4a; border: 2px solid #4a3a8a; cursor: grab;
  transition: transform .1s, border-color .1s;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 2px;
  padding: 3px;
}
.r-box-pick:hover { border-color: #f5c542; transform: scale(1.03); }
.r-box-pick.empty { opacity: .3; cursor: not-allowed; }

.r-bike-area {
  background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
  border: 2px solid #3a3a4e;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.r-bike-rear, .r-bike-front {
  background: rgba(13,27,46,.6);
  border: 1px dashed #4a5a7e;
  z-index: 5;
}
.r-bike-rear.drag-target, .r-bike-front.drag-target {
  border-color: #2ecc71; background: rgba(26,74,62,.4);
}

/* Stickers: only icon, no text */
.sticker-icon { font-size: clamp(18px, 2.2vw, 36px); }
.sticker-qty {
  position: absolute; bottom: 2px; right: 4px;
  font-size: clamp(8px, 0.7vw, 11px); color: #2ecc71; font-weight: 700;
  background: rgba(0,0,0,.5); padding: 0 4px; border-radius: 3px;
}
.sticker-qty.zero { color: #555; }

/* Box pick preview */
.bp-prev {
  display: grid; gap: 1px; padding: 1px; background: #0a0f1a; border-radius: 2px;
  width: 70%; aspect-ratio: 1;
}
.bp-prev > div { background: #6a8aff; border-radius: 1px; }
.bp-label { font-size: clamp(8px, 0.7vw, 10px); color: #ccc; font-weight: 700; }
.bp-qty { font-size: clamp(9px, 0.8vw, 12px); color: #2ecc71; font-weight: 800; }

/* Tetris piece shapes — in shelf */
.shelf-piece {
  display: grid;
  cursor: grab;
  user-select: none;
  pointer-events: auto;
  transition: filter .1s;
  position: relative;
}
.shelf-piece:hover { filter: brightness(1.2); }
.shelf-piece.dragging { opacity: .35; }
.tcell {
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}

/* Spawned box (floating in pack zone) */
.spawn-box {
  position: absolute;
  background: #2a1a4a;
  border: 2px solid #c87030;
  border-radius: 6px;
  box-shadow: 0 3px 10px rgba(0,0,0,.6);
  display: flex; flex-direction: column;
  overflow: hidden;
  z-index: 10;
}
.spawn-box.locked { border-color: #f5c542; }
.spawn-box.on-bike { border-color: #2ecc71; opacity: .7; }

.sb-bar {
  background: #3a2010;
  padding: 2px 4px;
  display: flex; align-items: center; gap: 4px;
  cursor: grab; user-select: none;
  font-size: clamp(8px, 0.65vw, 10px);
}
.sb-bar:active { cursor: grabbing; }
.sb-title { color: #f0c898; font-weight: 700; flex: 1; }
.sb-x {
  width: clamp(12px, 1.1vw, 16px);
  height: clamp(12px, 1.1vw, 16px);
  border-radius: 50%;
  background: rgba(0,0,0,.3);
  color: #c08050;
  font-size: clamp(7px, 0.6vw, 10px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.sb-x:hover { background: #e74c3c; color: #fff; }
.sb-body { padding: 3px; display: flex; flex-direction: column; gap: 2px; align-items: center; }
.sb-status {
  font-size: clamp(7px, 0.6vw, 9px);
  font-weight: 700; letter-spacing: .3px;
  text-align: center;
}
.sb-owner { font-size: clamp(7px, 0.55vw, 9px); color: #aaa; }
.sb-stickers { font-size: clamp(8px, 0.7vw, 11px); }

/* Grid (inside spawned box) */
.grid-container { display: grid; gap: 1px; background: transparent; }
.grid-cell {
  background: #0a1525;
  border: 1px solid #1a3a6e;
  border-radius: 2px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s;
}
.grid-cell.drag-over { background: rgba(46,204,113,.25); border-color: #2ecc71; }
.grid-cell.drag-invalid { background: rgba(233,69,96,.25); border-color: #e94560; }
.grid-cell.foam-bg { background: #3a2a10 !important; border-color: #7a5020; }

.cell-item {
  position: absolute;
  inset: 1px;
  border-radius: 2px;
  font-size: clamp(8px, 0.8vw, 13px);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  cursor: pointer;
  text-shadow: 0 1px 1px rgba(0,0,0,.5);
  overflow: hidden;
}

/* Sticky note (order printout) */
.sticky-note {
  position: absolute;
  background: #fbeb6a;
  border-radius: 2px 2px 2px 12px;
  box-shadow: 4px 5px 14px rgba(0,0,0,.5), 1px 1px 0 #d4c840;
  overflow: hidden;
  z-index: 50;
  cursor: default;
  font-size: clamp(8px, 0.75vw, 12px);
}
.sn-header {
  background: #e8d840;
  padding: clamp(3px, 0.4vw, 6px) clamp(4px, 0.5vw, 8px);
  display: flex; align-items: center; gap: 4px;
  cursor: grab;
  user-select: none;
  font-weight: 800;
  color: #4a3a00;
}
.sn-header:active { cursor: grabbing; }
.sn-code {
  flex: 1; letter-spacing: 1px;
  font-size: clamp(9px, 0.85vw, 13px);
  font-family: 'Courier New', monospace;
}
.sn-close {
  width: clamp(14px, 1.2vw, 18px);
  height: clamp(14px, 1.2vw, 18px);
  border-radius: 50%;
  background: rgba(0,0,0,.12);
  color: #5a4a00;
  font-size: clamp(8px, 0.7vw, 11px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.sn-close:hover { background: rgba(180,0,0,.2); color: #800; }
.sn-body { padding: clamp(4px, 0.5vw, 8px); }
.sn-cust {
  font-size: clamp(8px, 0.7vw, 10px);
  color: #6a5a00;
  font-weight: 700;
  margin-bottom: 4px;
}
.sn-addr { font-size: clamp(7px, 0.6vw, 9px); color: #8a7a00; margin-bottom: 6px; }
.sn-item {
  display: flex; align-items: center; gap: 4px;
  color: #3a3000; line-height: 1.6;
  font-size: clamp(8px, 0.75vw, 11px);
}
.sn-dot { width: 5px; height: 5px; border-radius: 50%; background: #b8a820; flex-shrink: 0; }
.sn-dot.packed { background: #2a8a20; }
.sn-name.packed { text-decoration: line-through; opacity: .55; }
.sn-check { color: #2a8a20; }
.sn-progress { height: 3px; background: rgba(0,0,0,.1); }
.sn-progress-fill { height: 100%; background: #2a8a20; transition: width .3s; }
.sn-loaded-badge {
  background: #2ecc71; color: #0a1a0a; font-weight: 800;
  text-align: center; font-size: clamp(7px, 0.6vw, 10px);
  letter-spacing: 1px; padding: 2px; margin: 4px 6px; border-radius: 3px;
}

/* Toast */
#toast-wrap {
  position: absolute; bottom: 16px; right: 16px;
  display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  z-index: 1000; pointer-events: none;
}
.toast {
  background: #16213e; border: 1px solid #2a5a9e;
  border-radius: 6px; padding: 6px 12px;
  font-size: clamp(9px, 0.8vw, 12px); color: #eee;
  animation: fadeT 3s ease forwards;
  max-width: 260px;
  pointer-events: auto;
}
@keyframes fadeT { 0%{opacity:0;transform:translateY(10px)} 15%{opacity:1;transform:translateY(0)} 75%{opacity:1} 100%{opacity:0} }

/* Numpad overlay */
#numpad-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.7);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
}
#numpad-overlay.hidden { display: none; }
.numpad-box {
  background: #16213e; border: 2px solid #f5c542; border-radius: 12px;
  padding: 18px; width: 240px; position: relative;
}
.numpad-close-btn {
  position: absolute; top: 8px; right: 8px;
  width: 24px; height: 24px; border-radius: 50%;
  background: #e74c3c; color: #fff; border: none;
  font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.numpad-box h4 { font-size: 11px; color: #f5c542; letter-spacing: 1.5px; text-align: center; margin-bottom: 8px; }
.numpad-display { font-size: 26px; font-weight: 800; text-align: center; color: #fff; letter-spacing: 8px; margin-bottom: 10px; min-height: 36px; }
.numpad-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
.numpad-btn {
  background: #0f2040; border: 1px solid #1a4a8a; color: #fff;
  font-family: inherit; font-size: 16px; font-weight: 700; border-radius: 6px;
  padding: 10px; cursor: pointer; transition: background .1s;
}
.numpad-btn:hover { background: #1a4a8a; }
.numpad-hint { font-size: 9px; color: #888; text-align: center; margin-top: 6px; }

/* Win overlay */
#win-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.85);
  z-index: 3000; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px;
}
#win-overlay.show { display: flex; }
#win-overlay h2 { font-size: clamp(20px, 2.5vw, 36px); color: #f5c542; letter-spacing: 3px; }
#win-overlay .win-stars { font-size: clamp(28px, 3.5vw, 48px); letter-spacing: 8px; }
#win-overlay .win-earn { font-size: clamp(20px, 2.5vw, 32px); color: #2ecc71; font-weight: 800; }
#win-overlay .win-btn {
  background: #1a4a8a; border: 2px solid #2a5a9e; color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 700;
  border-radius: 8px; padding: 12px 28px; cursor: pointer; letter-spacing: 1px;
}
#win-overlay .win-btn:hover { background: #2a5a9e; }

#header-info {
  position: absolute; top: 6px; left: 50%;
  transform: translateX(-50%);
  font-size: clamp(9px, 0.8vw, 13px);
  color: #f5c542; font-weight: 700; letter-spacing: 1px;
  z-index: 100; pointer-events: none;
}
#deliver-btn {
  position: absolute; bottom: 6px; left: 50%;
  transform: translateX(-50%);
  background: #2c3e50; border: 2px solid #555;
  color: #777; font-family: inherit; font-weight: 700;
  font-size: clamp(10px, 0.9vw, 13px);
  padding: 6px 24px; border-radius: 8px;
  cursor: not-allowed; letter-spacing: 1px;
  z-index: 100;
}
#deliver-btn.ready { background: #1a6a2a; border-color: #2ecc71; color: #fff; cursor: pointer; }
#deliver-btn.ready:hover { background: #2ecc71; color: #0a1a0a; }

</style>
</head>
<body>

<div id="game">
  <div id="header-info">🛵 TÀI XẾ KÝ TÀI — PACKING LEVEL 1</div>

  <!-- Region: Items zone (D4:S15) → col=4, row=4, w=16, h=12 -->
  <div class="region r-items" id="items-zone"
       style="grid-column: 4 / span 16; grid-row: 4 / span 12;
              display: grid;
              grid-template-columns: repeat(16, 1fr);
              grid-template-rows: repeat(12, 1fr);
              gap: 1px;
              padding: 3px;"></div>

  <!-- Region: Pack zone (T4:AU15) → col=20, row=4, w=28, h=12 -->
  <div class="region r-pack" id="pack-zone"
       style="grid-column: 20 / span 28; grid-row: 4 / span 12;"></div>

  <!-- Box pickers row (D17:S19) — XL, LG, MD, SM in a single row -->
  <div class="region r-box-pick" data-box="box_xl"  style="grid-column: 4  / span 4; grid-row: 17 / span 3;"></div>
  <div class="region r-box-pick" data-box="box_lg"  style="grid-column: 8  / span 4; grid-row: 17 / span 3;"></div>
  <div class="region r-box-pick" data-box="box_md"  style="grid-column: 12 / span 4; grid-row: 17 / span 3;"></div>
  <div class="region r-box-pick" data-box="box_sm"  style="grid-column: 16 / span 4; grid-row: 17 / span 3;"></div>

  <!-- Sticker row 1: 6 hazard stickers (D20:O22) -->
  <div class="region r-sticker" data-supply="stk_breakable"   style="grid-column: 4  / span 2; grid-row: 20 / span 3;">
    <span class="sticker-icon">💔</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-sticker" data-supply="stk_flammable"   style="grid-column: 6  / span 2; grid-row: 20 / span 3;">
    <span class="sticker-icon">🔥</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-sticker" data-supply="stk_heavy"       style="grid-column: 8  / span 2; grid-row: 20 / span 3;">
    <span class="sticker-icon">🏋</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-sticker" data-supply="stk_keepdry"     style="grid-column: 10 / span 2; grid-row: 20 / span 3;">
    <span class="sticker-icon">💧</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-sticker" data-supply="stk_radioactive" style="grid-column: 12 / span 2; grid-row: 20 / span 3;">
    <span class="sticker-icon">☢</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-sticker" data-supply="stk_chemical"    style="grid-column: 14 / span 2; grid-row: 20 / span 3;">
    <span class="sticker-icon">⚗</span><span class="sticker-qty">×9</span>
  </div>

  <!-- Foam / Address / Bubble / Tape (D24:O25) -->
  <div class="region r-foam"    data-supply="foam"      style="grid-column: 4  / span 3; grid-row: 24 / span 2;">
    <span class="sticker-icon">🫧</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-address" data-supply="address"   style="grid-column: 8  / span 3; grid-row: 24 / span 2;">
    <span class="sticker-icon">🏷</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-bubble"  data-supply="bubble"    style="grid-column: 11 / span 2; grid-row: 24 / span 2;">
    <span class="sticker-icon">💠</span><span class="sticker-qty">×9</span>
  </div>
  <div class="region r-tape"    data-supply="duct_tape" style="grid-column: 14 / span 2; grid-row: 24 / span 2;">
    🩹
  </div>

  <!-- Printer (Q21:S23) -->
  <div class="region r-printer" id="printer" style="grid-column: 17 / span 3; grid-row: 21 / span 3;">
    <span style="font-size:clamp(18px,2vw,32px)">🖨</span>
    <span style="font-size:clamp(7px,0.65vw,10px);color:#f5c542;font-weight:700">IN ĐƠN</span>
  </div>

  <!-- Shredder = Máy huỷ đơn (Q25:S26, decoration only) -->
  <div class="region r-shredder" style="grid-column: 17 / span 3; grid-row: 25 / span 2;">
    <span style="font-size:clamp(14px,1.4vw,22px)">📄</span>
    <span style="font-size:clamp(7px,0.65vw,10px);color:#aa3a50;font-weight:700">HUỶ ĐƠN</span>
  </div>

  <!-- Scanner = Máy kiểm tra đơn (U17:Z22, decoration only) -->
  <div class="region r-scanner" style="grid-column: 21 / span 6; grid-row: 17 / span 6;">
    <span style="font-size:clamp(26px,3vw,48px)">📡</span>
    <span style="font-size:clamp(8px,0.7vw,11px);color:#5a8aae;margin-top:6px">KIỂM TRA ĐƠN</span>
  </div>

  <!-- Trash (V25:Y26, decoration only) -->
  <div class="region r-trash" id="trash" style="grid-column: 22 / span 4; grid-row: 25 / span 2;">
    <span style="font-size:clamp(16px,1.6vw,24px)">🗑</span>
    <span style="font-size:clamp(7px,0.65vw,10px);color:#888;margin-left:6px">THÙNG RÁC</span>
  </div>

  <!-- Bike area background (AB17:AU26) -->
  <div class="region r-bike-area" id="bike-area" style="grid-column: 28 / span 20; grid-row: 17 / span 10;">
    <svg width="86%" height="80%" viewBox="0 0 480 200" preserveAspectRatio="xMidYMid meet" style="position:absolute;pointer-events:none">
      <ellipse cx="240" cy="195" rx="220" ry="6" fill="#0a0a14" opacity=".4"/>
      <rect x="20" y="78" width="32" height="40" fill="#0a0a14" stroke="#3a4a5e" stroke-width="2" rx="4"/>
      <rect x="430" y="82" width="32" height="36" fill="#0a0a14" stroke="#3a4a5e" stroke-width="2" rx="4"/>
      <rect x="436" y="60" width="6" height="62" fill="#3a4a5e" stroke="#1a2a3e" rx="2"/>
      <circle cx="439" cy="64" r="4" fill="#5a6a7e"/>
      <circle cx="439" cy="118" r="4" fill="#5a6a7e"/>
      <path d="M385 70 Q395 58 425 58 L425 122 Q395 122 385 110 Z" fill="#c12838" stroke="#7a1a20" stroke-width="2"/>
      <ellipse cx="416" cy="90" rx="4" ry="8" fill="#f5c542" opacity=".9"/>
      <rect x="200" y="72" width="180" height="50" fill="#1a1a1e" stroke="#3a3a40" stroke-width="2" rx="6"/>
      <rect x="232" y="80" width="146" height="34" fill="#2a2a30" stroke="#3a3a40" rx="2"/>
      <path d="M52 70 L200 70 L200 122 L52 122 Q42 122 42 112 L42 80 Q42 70 52 70 Z" fill="#c12838" stroke="#7a1a20" stroke-width="2"/>
      <ellipse cx="48" cy="96" rx="4" ry="6" fill="#e94560" opacity=".8"/>
    </svg>
  </div>

  <!-- Bike rear cargo slot (AC18:AP25) -->
  <div class="region r-bike-rear" id="bike-rear"
       style="grid-column: 29 / span 14; grid-row: 18 / span 8;"></div>

  <!-- Bike front bửng slot (AQ19:AT24) -->
  <div class="region r-bike-front" id="bike-front"
       style="grid-column: 43 / span 4; grid-row: 19 / span 6;"></div>


  <button id="deliver-btn" onclick="tryDeliver()">🛵 ĐI SHIP ▶</button>
</div>

<!-- Numpad -->

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════════════ */
// Tetris shapes (4 blocks each)
const TETRIS_SHAPES = [
  {key:'I', cells:[[0,0],[0,1],[0,2],[0,3]]},
  {key:'O', cells:[[0,0],[0,1],[1,0],[1,1]]},
  {key:'T', cells:[[0,0],[0,1],[0,2],[1,1]]},
  {key:'L', cells:[[0,0],[1,0],[2,0],[2,1]]},
  {key:'J', cells:[[0,1],[1,1],[2,0],[2,1]]},
  {key:'S', cells:[[0,1],[0,2],[1,0],[1,1]]},
  {key:'Z', cells:[[0,0],[0,1],[1,1],[1,2]]},
];
const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];
const STK_EMOJI = {
  stk_breakable:'💔', stk_flammable:'🔥', stk_heavy:'🏋',
  stk_keepdry:'💧', stk_radioactive:'☢', stk_chemical:'⚗'
};
const SUPPLY_EMOJI = {foam:'🫧', bubble:'💠', duct_tape:'🩹', address:'🏷'};

// 5 orders × 6 blocks = 30 total. Cố định để demo.
// Each block: {shapeKey, color, fragile, stickers}
function makeBlock(shapeKey, color, fragile, stickers) {
  return {shapeKey, color, fragile, stickers: stickers||[]};
}

const ORDERS_DEF = [
  {
    customer: 'Nguyễn Văn A', addr: '12 Lê Lợi, Q1', code: '101',
    blocks: [
      makeBlock('I', COLORS[0], false, []),
      makeBlock('O', COLORS[1], true,  ['stk_breakable']),
      makeBlock('T', COLORS[2], false, []),
      makeBlock('L', COLORS[3], false, ['stk_heavy']),
      makeBlock('S', COLORS[4], false, []),
      makeBlock('J', COLORS[5], true,  ['stk_breakable','stk_keepdry']),
    ],
  },
  {
    customer: 'Trần Thị B', addr: '45 Nguyễn Huệ, Q1', code: '202',
    blocks: [
      makeBlock('Z', COLORS[6], false, ['stk_flammable']),
      makeBlock('O', COLORS[0], true,  ['stk_breakable']),
      makeBlock('I', COLORS[1], false, []),
      makeBlock('T', COLORS[2], false, []),
      makeBlock('L', COLORS[3], true,  ['stk_breakable']),
      makeBlock('S', COLORS[4], false, ['stk_chemical']),
    ],
  },
  {
    customer: 'Lê Văn C', addr: '88 Võ Văn Kiệt, Q5', code: '303',
    blocks: [
      makeBlock('J', COLORS[5], false, []),
      makeBlock('I', COLORS[6], false, ['stk_heavy']),
      makeBlock('Z', COLORS[0], false, []),
      makeBlock('O', COLORS[1], true,  ['stk_breakable']),
      makeBlock('T', COLORS[2], false, ['stk_keepdry']),
      makeBlock('L', COLORS[3], false, []),
    ],
  },
  {
    customer: 'Phạm Thu D', addr: '12 Nam Kỳ, Q3', code: '404',
    blocks: [
      makeBlock('S', COLORS[4], true,  ['stk_breakable']),
      makeBlock('I', COLORS[5], false, []),
      makeBlock('O', COLORS[6], false, ['stk_radioactive']),
      makeBlock('T', COLORS[0], false, []),
      makeBlock('J', COLORS[1], true,  ['stk_breakable']),
      makeBlock('L', COLORS[2], false, []),
    ],
  },
  {
    customer: 'Hoàng Minh E', addr: '77 Cách Mạng, Q10', code: '505',
    blocks: [
      makeBlock('I', COLORS[3], false, []),
      makeBlock('Z', COLORS[4], false, ['stk_chemical']),
      makeBlock('O', COLORS[5], true,  ['stk_breakable']),
      makeBlock('L', COLORS[6], false, []),
      makeBlock('T', COLORS[0], false, ['stk_heavy']),
      makeBlock('S', COLORS[1], false, []),
    ],
  },
];

// Each block earns 20.000đ for simplicity
const PRICE_PER_BLOCK = 20000;

// Box defs
const BOX_DEFS = {
  box_xl: {rows:4, cols:5, label:'4×5', color:'#1a4a8a'},
  box_lg: {rows:3, cols:4, label:'3×4', color:'#4a1a8a'},
  box_md: {rows:2, cols:3, label:'2×3', color:'#1a6a3a'},
  box_sm: {rows:1, cols:2, label:'1×2', color:'#6a4a1a'},
};

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let S;
let drag = {kind:null};
let spawnCounter = 0;
let printedCount = 0;

function initState() {
  // Build item instances per order
  const orders = ORDERS_DEF.map((o,oi) => ({
    id: 'ord_'+oi,
    customer: o.customer,
    addr: o.addr,
    code: o.code,
    blocks: o.blocks.map((b,bi) => ({
      ...b,
      id: 'item_'+oi+'_'+bi,
      orderId: 'ord_'+oi,
    })),
  }));
  // Pool: 30 item instances
  const itemPool = {};
  orders.forEach(o => o.blocks.forEach(b => itemPool[b.id] = b));

  S = {
    orders,
    itemPool,
    inventory: {
      foam:9, bubble:9, duct_tape:9, address:9,
      stk_breakable:9, stk_flammable:9, stk_heavy:9,
      stk_keepdry:9, stk_radioactive:9, stk_chemical:9,
      box_xl:6, box_lg:6, box_md:6, box_sm:6,
    },
    packedItems: new Set(),
    bubbled: new Set(),
    itemRotations: {},
    itemPositions: {},  // item.id -> {x, y} (% within items-zone)
    spawnedBoxes: [],   // [{spawnId, boxKey, x, y}] x,y in % of pack-zone
    boxState: {},
    boxOwner: {},
    boxGrids: {},
    boxes: {},          // boxKey -> def (clone w/ baseKey)
    rearRows: [[],[],[]],   // 3 tầng, mỗi tầng tối đa 7 cột
    frontRows: [[],[],[]],  // 3 tầng, mỗi tầng tối đa 2 cột
    printedOrders: new Set(), // order ids that have sticky note shown
    stickies: {},       // orderId -> {el, x, y}
    earn: 0,
  };

  // Bin-pack all 30 items into the 12×16 grid (rows × cols).
  // Strategy: sort blocks by bounding-box area DESC, then for each block
  // try 4 rotations × all positions (row-major) and take the first that fits.
  // The chosen rotation is saved into S.itemRotations so render/drag stay consistent.
  const ZONE_ROWS = 12, ZONE_COLS = 16;
  const occupied = Array.from({length:ZONE_ROWS}, () => Array(ZONE_COLS).fill(false));

  // --- rotation helpers (local copy; the global ones use S which isn't fully wired yet) ---
  function _norm(cells) {
    const mr = Math.min(...cells.map(c=>c[0]));
    const mc = Math.min(...cells.map(c=>c[1]));
    return cells.map(([r,c])=>[r-mr, c-mc]);
  }
  function _rot90(cells) { return _norm(cells.map(([r,c])=>[c, -r])); }
  function _allRotations(cells) {
    const seen = new Set();
    const out = [];
    let cur = _norm(cells.map(x=>[...x]));
    for(let i=0;i<4;i++){
      const k = cur.map(c=>c.join(',')).sort().join('|');
      if(!seen.has(k)) { seen.add(k); out.push(cur); }
      cur = _rot90(cur);
    }
    return out;
  }
  function _bbox(cells) {
    return {
      pRows: Math.max(...cells.map(c=>c[0]))+1,
      pCols: Math.max(...cells.map(c=>c[1]))+1,
    };
  }

  // Build flat list of all blocks with their base bbox area for sorting.
  const allBlocks = [];
  orders.forEach(o => {
    o.blocks.forEach(b => {
      const def = TETRIS_SHAPES.find(s=>s.key===b.shapeKey);
      const {pRows, pCols} = _bbox(def.cells);
      allBlocks.push({block: b, area: pRows * pCols});
    });
  });
  // Sort by area DESC (stable: blocks with equal area keep original order)
  allBlocks.sort((a,b) => b.area - a.area);

  function tryPlaceWithRotation(block) {
    const def = TETRIS_SHAPES.find(s=>s.key===block.shapeKey);
    const rotations = _allRotations(def.cells);
    for(let rotIdx=0; rotIdx<rotations.length; rotIdx++) {
      const rcells = rotations[rotIdx];
      const {pRows, pCols} = _bbox(rcells);
      for(let r=0; r<=ZONE_ROWS - pRows; r++) {
        for(let c=0; c<=ZONE_COLS - pCols; c++) {
          let fits = true;
          for(let dr=0; dr<pRows && fits; dr++) {
            for(let dc=0; dc<pCols && fits; dc++) {
              if(occupied[r+dr][c+dc]) fits = false;
            }
          }
          if(fits) {
            for(let dr=0; dr<pRows; dr++) {
              for(let dc=0; dc<pCols; dc++) {
                occupied[r+dr][c+dc] = true;
              }
            }
            return {gridR: r, gridC: c, rotation: rotIdx};
          }
        }
      }
    }
    return null;
  }

  allBlocks.forEach(({block}) => {
    const p = tryPlaceWithRotation(block);
    if(p) {
      S.itemPositions[block.id] = {gridR: p.gridR, gridC: p.gridC};
      // Save the chosen rotation so renderer/drag use the same orientation
      if(p.rotation) S.itemRotations[block.id] = p.rotation;
    } else {
      console.warn('Bin-pack failed for block', block.id, block.shapeKey);
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════ */
function mkGrid(rows, cols) {
  return Array.from({length: rows}, () => Array(cols).fill(null));
}
function fmt(n) { return (n||0).toLocaleString('vi-VN'); }

function getItem(id) { return S.itemPool[id]; }
function getShapeCells(item) {
  const def = TETRIS_SHAPES.find(s => s.key === item.shapeKey);
  let c = def.cells.map(x=>[...x]);
  const rot = S.itemRotations[item.id]||0;
  for(let i=0;i<rot;i++) c = rotateCells(c);
  return c;
}
function rotateCells(cells) { return normCells(cells.map(([r,c])=>[c,-r])); }
function normCells(cells) {
  const minR=Math.min(...cells.map(c=>c[0])), minC=Math.min(...cells.map(c=>c[1]));
  return cells.map(([r,c])=>[r-minR,c-minC]);
}
function canFit(cells, r, c, grid) {
  return cells.every(([dr,dc])=>{
    const nr=r+dr, nc=c+dc;
    return nr>=0 && nr<grid.length && nc>=0 && nc<grid[0].length && !grid[nr][nc];
  });
}
function findOrderForItem(id) {
  const it = getItem(id);
  return it ? S.orders.find(o=>o.id===it.orderId) : null;
}

function showToast(msg) {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════ */
function renderAll() {
  renderItemsZone();
  renderSupplyQtys();
  renderBoxPickers();
  renderSpawnedBoxes();
  renderBikeSlots();
  renderStickies();
  updateDeliverBtn();
}

/* ─── Items zone ──────────────────────────────────────────── */
function renderItemsZone() {
  const zone = document.getElementById('items-zone');
  // Remove only packed pieces
  zone.querySelectorAll('.shelf-piece').forEach(el => {
    if(S.packedItems.has(el.dataset.itemid)) el.remove();
  });
  // Add new pieces
  const existing = new Set([...zone.querySelectorAll('.shelf-piece')].map(e=>e.dataset.itemid));
  Object.values(S.itemPool).forEach(item => {
    if(S.packedItems.has(item.id)) return;
    if(existing.has(item.id)) return;
    const piece = buildShelfPiece(item);
    zone.appendChild(piece);
  });
}

function buildShelfPiece(item) {
  const cells = getShapeCells(item);
  const rows = Math.max(...cells.map(c=>c[0]))+1;
  const cols = Math.max(...cells.map(c=>c[1]))+1;
  const pos = S.itemPositions[item.id]; // {gridR, gridC} now (grid coords)

  const wrap = document.createElement('div');
  wrap.className = 'shelf-piece';
  wrap.dataset.itemid = item.id;
  wrap.dataset.rows = rows;
  wrap.dataset.cols = cols;
  // Grid placement: column = gridC+1, span cols; row = gridR+1, span rows
  if(pos) {
    wrap.style.gridColumn = `${pos.gridC+1} / span ${cols}`;
    wrap.style.gridRow = `${pos.gridR+1} / span ${rows}`;
  }
  // Inner grid for cells — fills the assigned grid area
  wrap.style.display = 'grid';
  wrap.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  wrap.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  wrap.style.width = '100%';
  wrap.style.height = '100%';
  wrap.draggable = true;

  if(item.fragile) wrap.title = '⚠️ Dễ vỡ — cần bọc Bubble Wrap';

  wrap.addEventListener('contextmenu', ev => {
    ev.preventDefault();
    S.itemRotations[item.id] = ((S.itemRotations[item.id]||0)+1) % 4;
    const zone = document.getElementById('items-zone');
    const old = zone.querySelector(`[data-itemid="${item.id}"]`);
    if(old) zone.replaceChild(buildShelfPiece(item), old);
  });

  wrap.addEventListener('dragstart', ev => {
    const cellsNow = getShapeCells(item);
    drag = {kind:'item', itemId: item.id, srcGrid:'shelf', cells: cellsNow};
    ev.dataTransfer.effectAllowed = 'move';
    setTimeout(()=>wrap.classList.add('dragging'),0);
  });
  wrap.addEventListener('dragend', () => wrap.classList.remove('dragging'));

  // Drop bubble wrap on fragile item
  wrap.addEventListener('dragover', ev => {
    if(drag.kind==='supply' && drag.supplyId==='bubble' && item.fragile && !S.bubbled.has(item.id)) {
      ev.preventDefault();
      wrap.style.outline='2px solid #2ecc71';
    }
  });
  wrap.addEventListener('dragleave', () => wrap.style.outline='');
  wrap.addEventListener('drop', ev => {
    if(drag.kind!=='supply' || drag.supplyId!=='bubble') return;
    ev.preventDefault(); ev.stopPropagation();
    wrap.style.outline='';
    if(!item.fragile) { showToast('Món này không cần bọc!'); return; }
    if(S.bubbled.has(item.id)) { showToast('Đã bọc rồi!'); return; }
    if(S.inventory.bubble<=0) { showToast('Hết Bubble Wrap!'); return; }
    S.bubbled.add(item.id); S.inventory.bubble--;
    showToast('✓ Đã bọc Bubble Wrap');
    const z = document.getElementById('items-zone');
    const old = z.querySelector(`[data-itemid="${item.id}"]`);
    if(old) z.replaceChild(buildShelfPiece(item), old);
    renderSupplyQtys();
  });

  // Render cells
  const bubbled = S.bubbled.has(item.id);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const cell = document.createElement('div');
    cell.className = 'tcell';
    cell.style.gridRow = r+1;
    cell.style.gridColumn = c+1;
    if(cells.some(x=>x[0]===r && x[1]===c)) {
      if(bubbled) { cell.style.background = '#f0f0f0'; cell.style.color = '#999'; }
      else { cell.style.background = item.color; }
      if(r===0 && c===0) {
        cell.textContent = item.fragile ? '⚠' : '';
        cell.style.fontSize = '0.8em';
      }
    } else {
      cell.style.visibility = 'hidden';
    }
    wrap.appendChild(cell);
  }
  return wrap;
}

/* ─── Supply quantities ─────────────────────────────────── */
function renderSupplyQtys() {
  document.querySelectorAll('[data-supply]').forEach(el => {
    const sid = el.dataset.supply;
    const qty = S.inventory[sid] || 0;
    const qEl = el.querySelector('.sticker-qty');
    if(qEl) {
      qEl.textContent = '×' + qty;
      qEl.classList.toggle('zero', qty<=0);
    }
    el.classList.toggle('disabled', qty<=0);
    el.draggable = qty>0;
  });
}

/* ─── Box pickers ───────────────────────────────────────── */
function renderBoxPickers() {
  document.querySelectorAll('[data-box]').forEach(el => {
    const bid = el.dataset.box;
    const def = BOX_DEFS[bid];
    const qty = S.inventory[bid] || 0;
    el.innerHTML = '';

    const prev = document.createElement('div');
    prev.className = 'bp-prev';
    prev.style.gridTemplateColumns = `repeat(${def.cols},1fr)`;
    prev.style.gridTemplateRows = `repeat(${def.rows},1fr)`;
    for(let i=0;i<def.rows*def.cols;i++){
      const c = document.createElement('div');
      c.style.background = def.color;
      prev.appendChild(c);
    }
    el.appendChild(prev);

    const lbl = document.createElement('div');
    lbl.className='bp-label';
    lbl.textContent = def.label;
    el.appendChild(lbl);

    const q = document.createElement('div');
    q.className = 'bp-qty';
    if(qty<=0) q.style.color='#555';
    q.textContent = '×'+qty;
    el.appendChild(q);

    el.classList.toggle('empty', qty<=0);
    el.draggable = qty>0;
  });
}

/* ─── Box pick drag ─────────────────────────────────────── */
document.querySelectorAll('[data-box]').forEach(el => {
  el.addEventListener('dragstart', ev => {
    if(el.classList.contains('empty')) { ev.preventDefault(); return; }
    drag = {kind:'box-spawn', defKey: el.dataset.box};
    ev.dataTransfer.effectAllowed = 'copy';
  });
});

/* ─── Supply drag ───────────────────────────────────────── */
document.querySelectorAll('[data-supply]').forEach(el => {
  el.addEventListener('dragstart', ev => {
    if(el.classList.contains('disabled')) { ev.preventDefault(); return; }
    drag = {kind:'supply', supplyId: el.dataset.supply};
    ev.dataTransfer.effectAllowed = 'move';
    setTimeout(()=>el.classList.add('dragging'),0);
  });
  el.addEventListener('dragend', ()=>el.classList.remove('dragging'));
});

/* ─── Pack zone (spawn boxes) ───────────────────────────── */
const packZone = document.getElementById('pack-zone');
packZone.addEventListener('dragover', ev => {
  if(drag.kind==='box-spawn') {
    ev.preventDefault();
    packZone.style.background = 'rgba(42,90,158,.2)';
  }
});
packZone.addEventListener('dragleave', () => packZone.style.background='');
packZone.addEventListener('drop', ev => {
  ev.preventDefault();
  packZone.style.background='';
  if(drag.kind !== 'box-spawn') return;
  const rect = packZone.getBoundingClientRect();
  const x = ((ev.clientX - rect.left) / rect.width) * 100;
  const y = ((ev.clientY - rect.top) / rect.height) * 100;
  spawnBox(drag.defKey, x, y);
  drag={kind:null};
});

function spawnBox(defKey, xPct, yPct) {
  if((S.inventory[defKey]||0)<=0) { showToast('Hết thùng này!'); return; }
  const aliasKey = '__sp__' + defKey + '__' + (++spawnCounter);
  S.boxes[aliasKey] = {...BOX_DEFS[defKey], baseKey: defKey};
  S.boxGrids[aliasKey] = mkGrid(BOX_DEFS[defKey].rows, BOX_DEFS[defKey].cols);
  S.boxOwner[aliasKey] = null;
  S.boxState[aliasKey] = {hasFoam:false, stickers:[], addressCode:null, status:'empty', taped:false};
  S.inventory[defKey]--;
  S.spawnedBoxes.push({spawnId:'sp'+spawnCounter, boxKey:aliasKey, x:xPct, y:yPct});
  renderSpawnedBoxes();
  renderBoxPickers();
}

function removeSpawnedBox(spawnId, returnToPool=true) {
  const idx = S.spawnedBoxes.findIndex(b=>b.spawnId===spawnId);
  if(idx<0) return;
  const {boxKey} = S.spawnedBoxes[idx];
  // Return items to shelf
  S.boxGrids[boxKey].forEach(row=>row.forEach(v=>{ if(v) S.packedItems.delete(v.id); }));
  if(returnToPool) {
    const base = S.boxes[boxKey].baseKey;
    S.inventory[base] = (S.inventory[base]||0)+1;
  }
  delete S.boxGrids[boxKey]; delete S.boxOwner[boxKey];
  delete S.boxState[boxKey]; delete S.boxes[boxKey];
  S.spawnedBoxes.splice(idx,1);
  renderSpawnedBoxes(); renderItemsZone(); renderBoxPickers();
  renderStickies(); updateDeliverBtn();
}

/* ─── Spawned boxes render ──────────────────────────────── */
function renderSpawnedBoxes() {
  const zone = document.getElementById('pack-zone');
  zone.querySelectorAll('.spawn-box').forEach(el=>el.remove());

  const onBike = new Set([...S.rearRows.flat(), ...S.frontRows.flat()]);
  S.spawnedBoxes.forEach(sp => {
    const {spawnId, boxKey, x, y} = sp;
    const def = S.boxes[boxKey]; if(!def) return;
    const bs = S.boxState[boxKey] || {};
    const win = document.createElement('div');
    win.className = 'spawn-box' + (bs.status==='ready'?' locked':'') + (onBike.has(boxKey)?' on-bike':'');
    win.style.left = x + '%';
    win.style.top = y + '%';
    win.id = 'spbox-' + spawnId;
    win.draggable = true;

    // Compute cell size based on box dimensions (clamped).
    // Linear scale = 2× original (area = 4× original).
    const cellSize = `clamp(20px, 2.4vw, 36px)`;

    win.innerHTML = `
      <div class="sb-bar" data-spawnid="${spawnId}">
        <span class="sb-title">${def.label}</span>
        <span class="sb-x" onclick="event.stopPropagation(); removeSpawnedBox('${spawnId}')">✕</span>
      </div>
      <div class="sb-body">
        <div class="grid-container" id="spgrid-${spawnId}"
             style="grid-template-columns:repeat(${def.cols},${cellSize});grid-template-rows:repeat(${def.rows},${cellSize})"></div>
        <div class="sb-owner" id="spown-${spawnId}">—</div>
        <div class="sb-status" id="spst-${spawnId}">—</div>
        <div class="sb-stickers" id="spstk-${spawnId}"></div>
      </div>`;
    zone.appendChild(win);
    setupBoxGrid(document.getElementById('spgrid-'+spawnId), boxKey, S.boxGrids[boxKey]);
    setupBoxSupplyDrop(win, boxKey);
    renderBoxStatus(boxKey);

    // Titlebar reposition + HTML5 drag for bike
    const bar = win.querySelector('.sb-bar');
    let tbDown = null;
    bar.addEventListener('mousedown', e => {
      if(e.target.classList.contains('sb-x')) return;
      tbDown = {x:e.clientX, y:e.clientY, sp};
    });
    bar.addEventListener('mousemove', e => {
      if(!tbDown) return;
      if(Math.abs(e.clientX-tbDown.x)>3 || Math.abs(e.clientY-tbDown.y)>3) {
        const rect = zone.getBoundingClientRect();
        window._spDrag = {
          sp: tbDown.sp,
          offX: tbDown.x - rect.left - (tbDown.sp.x/100 * rect.width),
          offY: tbDown.y - rect.top  - (tbDown.sp.y/100 * rect.height),
          rect,
        };
        tbDown = null;
      }
    });
    bar.addEventListener('mouseup', ()=>tbDown=null);

    win.addEventListener('dragstart', ev => {
      if(ev.target.closest('.sb-x') || ev.target.closest('.cell-item')) return;
      if(!canBoxGoOnBike(boxKey)) {
        showToast('Thùng chưa SẴN SÀNG (cần đủ băng keo + sticker + địa chỉ)!');
        ev.preventDefault(); return;
      }
      drag = {kind:'box-to-bike', boxKey};
      ev.dataTransfer.effectAllowed = 'move';
      window._spDrag = null; tbDown = null;
    });
    win.addEventListener('dragend', ()=>{ if(drag.kind==='box-to-bike') drag={kind:null}; });
  });
}

document.addEventListener('mousemove', e => {
  if(!window._spDrag) return;
  const {sp, offX, offY, rect} = window._spDrag;
  const nx = ((e.clientX - rect.left - offX) / rect.width) * 100;
  const ny = ((e.clientY - rect.top  - offY) / rect.height) * 100;
  sp.x = Math.max(0, Math.min(85, nx));
  sp.y = Math.max(0, Math.min(80, ny));
  const win = document.getElementById('spbox-'+sp.spawnId);
  if(win) { win.style.left = sp.x+'%'; win.style.top = sp.y+'%'; }
});
document.addEventListener('mouseup', ()=>{ window._spDrag = null; });

/* ─── Setup box grid (drop items in) ───────────────────── */
function setupBoxGrid(el, boxKey, gridData) {
  el.innerHTML = '';
  const rows = gridData.length, cols = gridData[0].length;
  const bs = S.boxState[boxKey] || {};

  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell' + (bs.hasFoam?' foam-bg':'');
    cell.dataset.r=r; cell.dataset.c=c;

    if(gridData[r][c]) {
      const it = getItem(gridData[r][c].id);
      const inner = document.createElement('div');
      inner.className = 'cell-item';
      const bub = S.bubbled.has(gridData[r][c].id);
      if(bub) { inner.style.background = '#f0f0f0'; inner.style.color='#999'; }
      else { inner.style.background = it?it.color:'#555'; }
      if(r===0 && c===0 && it) inner.textContent = it.fragile?'⚠':'';
      inner.draggable = true;
      inner.addEventListener('dragstart', ev => {
        const cellsNow = getShapeCells(it);
        drag = {kind:'item', itemId:gridData[r][c].id, srcGrid:boxKey, srcR:r, srcC:c, cells:cellsNow};
        ev.dataTransfer.effectAllowed='move';
        ev.stopPropagation();
      });
      cell.appendChild(inner);
    }

    cell.addEventListener('dragover', ev => {
      if(drag.kind!=='item') return;
      const cells = drag.cells || getShapeCells(getItem(drag.itemId));
      const ok = canFit(cells, r, c, gridData);
      ev.preventDefault();
      cell.classList.toggle('drag-over', ok);
      cell.classList.toggle('drag-invalid', !ok);
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over','drag-invalid'));
    cell.addEventListener('drop', ev => {
      ev.preventDefault();
      cell.classList.remove('drag-over','drag-invalid');
      if(drag.kind!=='item') return;
      const cells = drag.cells || getShapeCells(getItem(drag.itemId));
      if(!canFit(cells,r,c,gridData)) { showToast('Không vừa!'); return; }
      removeItemFromGrids(drag.itemId);
      cells.forEach(([dr,dc])=>gridData[r+dr][c+dc]={id:drag.itemId});
      S.packedItems.add(drag.itemId);
      // Set owner
      const ord = findOrderForItem(drag.itemId);
      if(ord) S.boxOwner[boxKey] = ord.id;
      updateBoxStatus(boxKey);
      drag = {kind:null};
      renderSpawnedBoxes(); renderItemsZone(); renderStickies(); updateDeliverBtn();
    });
    el.appendChild(cell);
  }
}

function removeItemFromGrids(itemId) {
  Object.values(S.boxGrids).forEach(grid =>
    grid.forEach(row => row.forEach((v,ci,arr) => { if(v?.id===itemId) arr[ci]=null; }))
  );
  S.packedItems.delete(itemId);
}

/* ─── Supply drop on box ────────────────────────────────── */
function setupBoxSupplyDrop(win, boxKey) {
  win.addEventListener('dragover', ev => {
    if(drag.kind==='supply') ev.preventDefault();
  });
  win.addEventListener('drop', ev => {
    ev.preventDefault();
    if(drag.kind!=='supply') return;
    handleSupplyDrop(boxKey, drag.supplyId);
    drag = {kind:null};
  });
  win.addEventListener('click', ev => {
    if(ev.target.closest('.sb-x') || ev.target.closest('.cell-item')) return;
    const bs = S.boxState[boxKey]; if(!bs) return;
    if(boxHasItems(boxKey) && !bs.addressCode && (bs.status==='sorted'||bs.status==='sealed')) {
      if(S.inventory.address>0) openNumpad({boxKey});
      else showToast('Hết Address Sticker!');
    }
  });
}

function handleSupplyDrop(boxKey, supplyId) {
  const bs = S.boxState[boxKey] || {};
  if(!boxHasItems(boxKey)) { showToast('Thùng trống!'); return; }
  const qty = S.inventory[supplyId]||0;
  if(qty<=0) { showToast('Hết!'); return; }

  if(supplyId==='foam') {
    if(bs.hasFoam) { showToast('Đã có mút rồi!'); return; }
    bs.hasFoam = true;
    S.inventory.foam--;
    showToast('✓ Chêm mút xốp');
    updateBoxStatus(boxKey);
    renderSpawnedBoxes(); renderSupplyQtys();
    return;
  }
  if(supplyId==='duct_tape') {
    if(bs.taped) { showToast('Đã dán băng keo rồi!'); return; }
    // Check fragile items need foam + bubble
    const fragileItems = getBoxFragile(boxKey);
    if(fragileItems.length>0 && !bs.hasFoam) {
      showToast('Cần MÚT XỐP trước cho hàng dễ vỡ!'); return;
    }
    if(fragileItems.some(id=>!S.bubbled.has(id))) {
      showToast('Cần BUBBLE WRAP cho hàng dễ vỡ trên kệ trước!'); return;
    }
    bs.taped = true;
    bs.status = 'sealed';
    S.inventory.duct_tape--;
    showToast('✓ Đã dán băng keo');
    updateBoxStatus(boxKey);
    renderSpawnedBoxes(); renderSupplyQtys();
    return;
  }
  if(supplyId==='address') {
    if(bs.status!=='sorted' && bs.status!=='sealed') {
      showToast('Cần dán băng keo trước!'); return;
    }
    openNumpad({boxKey}); return;
  }
  if(supplyId.startsWith('stk_')) {
    if(bs.stickers.includes(supplyId)) { showToast('Đã dán sticker này!'); return; }
    bs.stickers.push(supplyId);
    S.inventory[supplyId]--;
    showToast('✓ Dán '+STK_EMOJI[supplyId]);
    updateBoxStatus(boxKey);
    renderSpawnedBoxes(); renderSupplyQtys();
    return;
  }
}

function getBoxFragile(boxKey) {
  const res = [];
  S.boxGrids[boxKey]?.forEach(row=>row.forEach(v=>{
    if(v) { const it = getItem(v.id); if(it?.fragile) res.push(v.id); }
  }));
  return res;
}

function boxHasItems(boxKey) {
  return S.boxGrids[boxKey]?.some(row=>row.some(v=>v!==null));
}

function getBoxNeededStickers(boxKey) {
  const needed = new Set();
  S.boxGrids[boxKey]?.forEach(row=>row.forEach(v=>{
    if(v) { const it = getItem(v.id); it?.stickers?.forEach(s=>needed.add(s)); }
  }));
  return [...needed];
}

function updateBoxStatus(boxKey) {
  const bs = S.boxState[boxKey]; if(!bs) return;
  if(!boxHasItems(boxKey)) { bs.status='empty'; return; }
  if(bs.addressCode) { bs.status='ready'; return; }
  if(bs.taped) {
    const needed = getBoxNeededStickers(boxKey);
    if(needed.every(s=>bs.stickers.includes(s))) bs.status='sorted';
    else bs.status='sealed';
    return;
  }
  bs.status='packing';
}

function canBoxGoOnBike(boxKey) {
  const bs = S.boxState[boxKey];
  return bs && boxHasItems(boxKey) && bs.status==='ready';
}

function renderBoxStatus(boxKey) {
  const sp = S.spawnedBoxes.find(b=>b.boxKey===boxKey);
  if(!sp) return;
  const id = sp.spawnId;
  const bs = S.boxState[boxKey] || {};
  const ownEl = document.getElementById('spown-'+id);
  const stEl = document.getElementById('spst-'+id);
  const stkEl = document.getElementById('spstk-'+id);
  if(!stEl) return;
  const ord = S.orders.find(o=>o.id===S.boxOwner[boxKey]);
  if(ownEl) ownEl.textContent = ord?ord.customer.split(' ').slice(-1)[0]:'—';
  const LABEL = {empty:'—', packing:'ĐÓNG GÓI', sealed:'DÁN BĂNG', sorted:'STICKER', ready:'✓ SẴN SÀNG'};
  const COLOR = {empty:'#555', packing:'#aaa', sealed:'#e67e22', sorted:'#3498db', ready:'#2ecc71'};
  stEl.textContent = LABEL[bs.status] || '—';
  stEl.style.color = COLOR[bs.status] || '#555';
  if(stkEl) {
    const needed = getBoxNeededStickers(boxKey);
    stkEl.innerHTML = needed.map(s =>
      bs.stickers.includes(s) ? `<span style="opacity:1">${STK_EMOJI[s]}</span>` :
                                 `<span style="opacity:.3">${STK_EMOJI[s]}</span>`
    ).join(' ');
    if(bs.addressCode) stkEl.innerHTML += ' <span style="color:#2ecc71">🏷</span>';
  }
}

/* ─── Bike slots (rear & front) — accept boxes only ─────── */
function renderBikeSlots() {
  renderBikeMultiRow('bike-rear', S.rearRows, 7);   // 3 tầng × 7 ô
  renderBikeMultiRow('bike-front', S.frontRows, 2); // 3 tầng × 2 ô
}

function renderBikeMultiRow(elId, rows, maxCols) {
  const el = document.getElementById(elId);
  el.innerHTML = '';
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  el.style.justifyContent = 'space-between';
  el.style.alignItems = 'stretch';
  el.style.gap = '3px';
  el.style.padding = '4px';

  rows.forEach((arr, ri) => {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = `display:flex;align-items:center;gap:2px;flex:1;background:rgba(0,0,0,.18);border:1px dashed #3a4a6e;border-radius:4px;padding:2px 4px;min-height:0;`;

    const used = arr.reduce((s,b)=>s+(S.boxes[b]?.cols||0), 0);
    const rem = maxCols - used;

    arr.forEach((bid, bi) => {
      const def = S.boxes[bid]; if(!def) return;
      const block = document.createElement('div');
      block.style.cssText = `position:relative;display:flex;height:88%;`;
      for(let ci=0;ci<def.cols;ci++) {
        const c = document.createElement('div');
        c.style.cssText = `flex:1;min-width:clamp(8px,1.1vw,20px);height:100%;background:${def.color};border:1px solid rgba(255,255,255,.2);margin-right:1px;border-radius:2px`;
        block.appendChild(c);
      }
      const rm = document.createElement('div');
      rm.style.cssText = `position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:#e74c3c;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5`;
      rm.textContent = '✕';
      rm.onclick = () => { arr.splice(bi,1); putBoxBackToZone(bid); };
      block.appendChild(rm);
      rowEl.appendChild(block);
    });

    for(let i=0;i<rem;i++) {
      const ec = document.createElement('div');
      ec.style.cssText = `flex:1;min-width:clamp(8px,1.1vw,20px);height:88%;background:#0a1525;border:1px solid #1a3a6e;border-radius:2px;opacity:.5`;
      rowEl.appendChild(ec);
    }

    // Drag target per row
    rowEl.ondragover = ev => {
      if(drag.kind!=='box-to-bike') return;
      ev.preventDefault();
      const bc = S.boxes[drag.boxKey]?.cols || 0;
      const allBoxesOnBike = [...S.rearRows.flat(), ...S.frontRows.flat()];
      const ok = used+bc<=maxCols && !allBoxesOnBike.includes(drag.boxKey);
      rowEl.style.borderColor = ok ? '#2ecc71' : '#e74c3c';
      rowEl.style.background = ok ? 'rgba(26,74,62,.3)' : 'rgba(74,26,26,.3)';
    };
    rowEl.ondragleave = () => {
      rowEl.style.borderColor = '#3a4a6e';
      rowEl.style.background = 'rgba(0,0,0,.18)';
    };
    rowEl.ondrop = ev => {
      ev.preventDefault();
      rowEl.style.borderColor = '#3a4a6e';
      rowEl.style.background = 'rgba(0,0,0,.18)';
      if(drag.kind!=='box-to-bike' || !drag.boxKey) return;
      const bid = drag.boxKey;
      const bc = S.boxes[bid]?.cols || 0;
      const allBoxesOnBike = [...S.rearRows.flat(), ...S.frontRows.flat()];
      if(used+bc<=maxCols && !allBoxesOnBike.includes(bid)) {
        arr.push(bid);
        const sIdx = S.spawnedBoxes.findIndex(b=>b.boxKey===bid);
        if(sIdx>=0) S.spawnedBoxes.splice(sIdx,1);
        renderAll();
      }
      drag = {kind:null};
    };

    el.appendChild(rowEl);
  });
}

function putBoxBackToZone(boxKey) {
  // Re-spawn box at center of pack-zone
  if(!S.boxes[boxKey]) return;
  spawnCounter++;
  S.spawnedBoxes.push({spawnId:'sp'+spawnCounter, boxKey, x:40, y:40});
  renderAll();
}

/* ═══════════════════════════════════════════════════════════════
   PRINTER & STICKY NOTES
═══════════════════════════════════════════════════════════════ */
document.getElementById('printer').addEventListener('click', () => {
  if(printedCount >= S.orders.length) {
    showToast('Đã in hết 5 đơn rồi!');
    return;
  }
  const ord = S.orders[printedCount];
  printedCount++;
  S.printedOrders.add(ord.id);
  // Spawn sticky note at fixed positions across pack-zone bottom area
  const idx = printedCount-1;
  // Position relative to game grid (percent based on whole game area)
  const stickyPositions = [
    {x:18, y:53},   // bottom-left of pack-zone
    {x:34, y:55},
    {x:50, y:52},
    {x:66, y:55},
    {x:78, y:52},
  ];
  const pos = stickyPositions[idx] || {x:30+idx*8, y:53};
  S.stickies[ord.id] = {x:pos.x, y:pos.y};
  renderStickies();
  showToast(`📋 Đã in đơn ${ord.code} — ${ord.customer}`);
});

const STICKY_ROTS = [-2.5, 1.8, -1.2, 2.8, -0.8];
function renderStickies() {
  // Remove old stickies
  document.querySelectorAll('.sticky-note').forEach(el=>el.remove());
  const game = document.getElementById('game');
  Object.entries(S.stickies).forEach(([orderId, pos], idx) => {
    const ord = S.orders.find(o=>o.id===orderId);
    if(!ord) return;
    const el = document.createElement('div');
    el.className = 'sticky-note';
    el.id = 'sticky-'+orderId;
    el.style.left = pos.x + '%';
    el.style.top = pos.y + '%';
    el.style.width = 'clamp(140px, 13vw, 200px)';
    el.style.transform = `rotate(${STICKY_ROTS[idx%STICKY_ROTS.length]}deg)`;
    buildStickyContent(el, ord);
    game.appendChild(el);
    makeStickyDraggable(el, orderId);
  });
}

function buildStickyContent(el, order) {
  const loaded = isOrderOnBike(order.id);
  const packed = order.blocks.filter(b=>S.packedItems.has(b.id)).length;
  const pct = loaded ? 100 : Math.round(packed/order.blocks.length*100);
  const itemsHtml = order.blocks.map(b => {
    const isPacked = S.packedItems.has(b.id);
    const showStrike = loaded || isPacked;
    const stk = b.stickers.map(s=>STK_EMOJI[s]||'').join('');
    return `<div class="sn-item">
      <div class="sn-dot ${showStrike?'packed':''}"></div>
      <span class="sn-name ${showStrike?'packed':''}">${b.shapeKey}-block ${stk}${b.fragile?' ⚠':''}</span>
      ${showStrike?'<span class="sn-check">✓</span>':''}
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="sn-progress"><div class="sn-progress-fill" style="width:${pct}%"></div></div>
    <div class="sn-header">
      <span class="sn-code">Mã: ${order.code}</span>
      <span class="sn-close" data-oid="${order.id}">✕</span>
    </div>
    ${loaded?'<div class="sn-loaded-badge">✓ ĐÃ CHẤT LÊN XE</div>':''}
    <div class="sn-body">
      <div class="sn-cust">👤 ${order.customer}</div>
      <div class="sn-addr">📍 ${order.addr}</div>
      ${itemsHtml}
    </div>`;
  el.querySelector('.sn-close').addEventListener('click', ev => {
    ev.stopPropagation();
    delete S.stickies[order.id];
    renderStickies();
  });
}

function makeStickyDraggable(el, orderId) {
  const header = el.querySelector('.sn-header');
  let info = null;
  header.addEventListener('mousedown', e => {
    if(e.target.classList.contains('sn-close')) return;
    const game = document.getElementById('game');
    const grect = game.getBoundingClientRect();
    const erect = el.getBoundingClientRect();
    info = {offX: e.clientX - erect.left, offY: e.clientY - erect.top, grect};
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if(!info) return;
    const x = ((e.clientX - info.grect.left - info.offX) / info.grect.width) * 100;
    const y = ((e.clientY - info.grect.top  - info.offY) / info.grect.height) * 100;
    el.style.left = Math.max(0, Math.min(85, x)) + '%';
    el.style.top  = Math.max(0, Math.min(85, y)) + '%';
    S.stickies[orderId] = {x, y};
  });
  document.addEventListener('mouseup', ()=>info=null);
}

function isOrderOnBike(orderId) {
  const onBike = new Set([...S.rearRows.flat(), ...S.frontRows.flat()]);
  for(const bid of onBike) {
    if(S.boxOwner[bid] === orderId) return true;
  }
  return false;
}

/* ═══════════════════════════════════════════════════════════════
   NUMPAD
═══════════════════════════════════════════════════════════════ */
let numpadCtx = null;
let numpadValue = '';

function openNumpad(ctx) {
  numpadCtx = ctx; numpadValue = '';
  document.getElementById('numpad-display').textContent='___';
  document.getElementById('numpad-overlay').classList.remove('hidden');
  document.getElementById('numpad-hint').textContent='Nhập mã 3 số của đơn hàng';
  document.getElementById('numpad-hint').style.color='#888';
  const grid = document.getElementById('numpad-grid'); grid.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'✕',0,'✓'].forEach(v => {
    const btn = document.createElement('button');
    btn.className='numpad-btn'; btn.textContent=v;
    if(v==='✓'){btn.style.background='#1a6a2a';btn.style.borderColor='#2ecc71';}
    if(v==='✕'){btn.style.background='#6a1a1a';btn.style.borderColor='#e94560';}
    btn.addEventListener('click', () => {
      if(v==='✕') numpadValue = numpadValue.slice(0,-1);
      else if(v==='✓') confirmNumpad();
      else if(numpadValue.length<3) numpadValue += v;
      document.getElementById('numpad-display').textContent = (numpadValue+'___').slice(0,3);
    });
    grid.appendChild(btn);
  });
}

function closeNumpad() {
  document.getElementById('numpad-overlay').classList.add('hidden');
  numpadCtx = null;
}

function confirmNumpad() {
  if(numpadValue.length<3) { showToast('Nhập đủ 3 số!'); return; }
  const boxKey = numpadCtx?.boxKey;
  if(!boxKey) { showToast('Lỗi context!'); return; }
  const oid = S.boxOwner[boxKey];
  const ord = S.orders.find(o=>o.id===oid);
  if(!ord) { showToast('Thùng chưa có hàng của đơn nào!'); return; }
  if(numpadValue !== ord.code) {
    document.getElementById('numpad-hint').textContent='❌ Mã sai — thử lại!';
    document.getElementById('numpad-hint').style.color='#e94560';
    numpadValue=''; document.getElementById('numpad-display').textContent='___';
    return;
  }
  S.boxState[boxKey].addressCode = numpadValue;
  S.boxState[boxKey].status = 'ready';
  S.inventory.address--;
  showToast('✓ Dán địa chỉ thành công!');
  closeNumpad();
  renderSpawnedBoxes(); renderSupplyQtys(); renderStickies(); updateDeliverBtn();
}

document.getElementById('numpad-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('numpad-overlay')) closeNumpad();
});
document.addEventListener('keydown', e => {
  if(e.key==='Escape' && !document.getElementById('numpad-overlay').classList.contains('hidden')) closeNumpad();
  if((e.key==='r' || e.key==='R') && drag.kind==='item') {
    S.itemRotations[drag.itemId] = ((S.itemRotations[drag.itemId]||0)+1)%4;
    drag.cells = getShapeCells(getItem(drag.itemId));
  }
});

/* ═══════════════════════════════════════════════════════════════
   DELIVER
═══════════════════════════════════════════════════════════════ */
function updateDeliverBtn() {
  const btn = document.getElementById('deliver-btn');
  const hasBox = S.rearRows.flat().length>0 || S.frontRows.flat().length>0;
  if(hasBox) { btn.className='ready'; btn.textContent='🛵 ĐI SHIP ▶'; }
  else { btn.className=''; btn.textContent='Chưa có hàng trên xe'; }
}

function tryDeliver() {
  if(!document.getElementById('deliver-btn').classList.contains('ready')) return;
  const onBike = new Set([...S.rearRows.flat(), ...S.frontRows.flat()]);
  let earn = 0;
  onBike.forEach(bid => {
    S.boxGrids[bid]?.forEach(row => row.forEach(v => {
      if(v) earn += PRICE_PER_BLOCK;
    }));
  });
  S.earn = earn;
  document.getElementById('win-earn').textContent = '+' + fmt(earn) + 'đ';
  // Stars based on % of all 30 blocks delivered
  const total = S.orders.reduce((s,o)=>s+o.blocks.length, 0);
  const delivered = [...onBike].reduce((s,bid)=>{
    return s + (S.boxGrids[bid]?.flat().filter(v=>v).length || 0);
  }, 0);
  const pct = delivered/total;
  document.getElementById('win-stars').textContent = pct>=.9?'⭐⭐⭐':pct>=.6?'⭐⭐':'⭐';
  document.getElementById('win-overlay').classList.add('show');
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
initState();
renderAll();
</script>
